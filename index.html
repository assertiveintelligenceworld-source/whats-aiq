<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What’s AIQ</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f4f6fb;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin-top: 20px;
    }

    p {
      line-height: 1.7;
    }

    .small {
      font-size: 14px;
      color: #666;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #eee;
      color: #222;
    }

    .progress {
      height: 8px;
      background: #ddd;
      border-radius: 10px;
      margin: 10px 0 20px;
    }

    .bar {
      height: 100%;
      background: #222;
      width: 0%;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="card">
    <h1>What’s AIQ</h1>
    <p>これはテストではありません。</p>
    <p>あなたの「考え方のくせ」を知るためのものです。</p>

    <div id="app"></div>
  </div>
</div>

<script>

const questions = [
  "ともだちと意見がちがったとき、どうする？",
  "イライラしたとき、どうしてる？",
  "ともだちがきついことを言ったとき、どう思う？",
  "うまくいかなかったとき、どう考える？",
  "自分の考えがまちがっていたと気づいたら？",
  "しっぱいしたとき、どうする？",
  "話しているとき、勝とうとしてることある？",
  "つよい言い方をしそうなとき、どうする？",
  "気持ちがごちゃごちゃしたとき、どうする？",
  "うまく伝わらなかったとき、どうする？",
  "ふあんになったとき、どう考える？",
  "世界をよくしたいと思ったとき、どうする？"
];

const options = [
  { text: "すぐ言い返す", score: 1 },
  { text: "ちょっと考える", score: 3 },
  { text: "相手の話をちゃんと聞く", score: 5 }
];

let current = 0;
let total = 0;

function start() {
  showQuestion();
}

function showQuestion() {
  const progress = (current / questions.length) * 100;

  document.getElementById("app").innerHTML = `
    <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
    <p>${current + 1} / ${questions.length}</p>
    <h2>${questions[current]}</h2>

    ${options.map(o => `
      <button onclick="answer(${o.score})">${o.text}</button>
    `).join("")}
  `;
}

function answer(score) {
  total += score;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let type = "";
  let msg = "";

  if (total >= 50) {
    type = "コンパス型";
    msg = "よく考えて行動できるタイプ";
  } else if (total >= 35) {
    type = "ミラー型";
    msg = "自分の気持ちに気づけるタイプ";
  } else if (total >= 25) {
    type = "ブリッジ型";
    msg = "人との関係を大事にできるタイプ";
  } else {
    type = "スパーク型";
    msg = "行動力があるタイプ";
  }

  document.getElementById("app").innerHTML = `
    <h2>あなたのタイプ</h2>
    <h3>${type}</h3>
    <p>${msg}</p>

    <p>今日の一歩</p>
    <p>だれかの話を、さいごまで聞いてみよう</p>

    <button onclick="restart()">もう一回やる</button>
  `;
}

function restart() {
  current = 0;
  total = 0;
  start();
}

start();

</script>
</body>
</html>
