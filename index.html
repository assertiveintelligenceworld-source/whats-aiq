<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>What’s AIQ｜Mirror Quest</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#fff7d6,#dbeafe);
  color:#222;
}
.container{
  max-width:680px;
  margin:auto;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:28px;
  padding:26px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}
.badge{
  display:inline-block;
  background:#ffedd5;
  color:#9a3412;
  padding:6px 14px;
  border-radius:999px;
  font-weight:700;
  font-size:14px;
}
h1{
  font-size:36px;
  margin:12px 0 4px;
  line-height:1.15;
}
.subtitle{
  font-weight:700;
  color:#334155;
}
p{line-height:1.8;}
.small{font-size:14px;color:#666;}
button{
  width:100%;
  padding:17px;
  margin:9px 0;
  border:none;
  border-radius:18px;
  font-size:16px;
  font-weight:700;
  background:#111827;
  color:#fff;
  cursor:pointer;
  box-shadow:0 5px 0 #374151;
}
button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #374151;
}
.choice{
  background:#fff;
  color:#222;
  border:2px solid #e5e7eb;
  box-shadow:0 5px 0 #d1d5db;
  text-align:left;
}
.choice:hover{background:#fef3c7;}
.secondary{
  background:#f1f5f9;
  color:#222;
  box-shadow:0 5px 0 #cbd5e1;
}
.progress{
  height:12px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin:16px 0 22px;
}
.bar{
  height:100%;
  background:linear-gradient(90deg,#f97316,#22c55e);
  width:0%;
  transition:.25s;
}
.result{
  background:#f8fafc;
  border:2px solid #e5e7eb;
  border-radius:22px;
  padding:18px;
  margin:15px 0;
}
.big{
  font-size:54px;
  margin:6px 0;
}
footer{
  text-align:center;
  color:#555;
  font-size:12px;
  margin:18px 0;
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <span class="badge">🌱 5分でできる視点ゲーム</span>
    <h1>What’s AIQ</h1>
    <p class="subtitle">Mirror Quest｜考え方のくせを見つける小さな冒険</p>
    <p>これはテストではありません。</p>
    <p>今のあなたの「問い方・受け止め方・対話のクセ」を見つけるリフレクションツールです。</p>
    <p class="small">正解を探すより、いろいろな見方を集めていきましょう。</p>

    <div id="app"></div>
  </div>

  <footer>問い方が変わると、世界の見え方が変わる。</footer>
</div>

<script>
const questions = [
  {
    text:"ともだちと意見がちがったとき、どうする？",
    category:"bridge",
    options:[
      {text:"🔥 すぐに言い返す",score:1},
      {text:"🤔 ちょっと考えてから話す",score:3},
      {text:"👂 まず相手の話をさいごまで聞く",score:5}
    ]
  },
  {
    text:"イライラしたとき、どうしてる？",
    category:"mirror",
    options:[
      {text:"💥 すぐに言葉や態度に出る",score:1},
      {text:"😮‍💨 少し時間をおく",score:3},
      {text:"🪞 なんでイライラしたのか考える",score:5}
    ]
  },
  {
    text:"ともだちがきついことを言ったとき、どう思う？",
    category:"bridge",
    options:[
      {text:"😡 ひどい！と思って言い返す",score:1},
      {text:"😕 何かあったのかな？と少し考える",score:3},
      {text:"🌉 本当は何を伝えたいのか考える",score:5}
    ]
  },
  {
    text:"うまくいかなかったとき、どう考える？",
    category:"compass",
    options:[
      {text:"😢 自分はダメだと思う",score:1},
      {text:"🔍 どこがむずかしかったか考える",score:3},
      {text:"🧭 次はどうすればいいか考える",score:5}
    ]
  },
  {
    text:"自分の考えがまちがっていたと気づいたら？",
    category:"compass",
    options:[
      {text:"🙈 みとめたくない",score:1},
      {text:"😅 ちょっとはずかしいけど考える",score:3},
      {text:"✨ 気づけてよかったと思う",score:5}
    ]
  },
  {
    text:"しっぱいしたとき、どうする？",
    category:"spark",
    options:[
      {text:"🌀 もうやりたくないと思う",score:1},
      {text:"🛠️ 何を変えればいいか考える",score:3},
      {text:"🚀 小さくやり直してみる",score:5}
    ]
  },
  {
    text:"話しているとき、勝とうとしてることある？",
    category:"mirror",
    options:[
      {text:"🏆 勝ちたいと思うことが多い",score:1},
      {text:"⚖️ ときどき気づく",score:3},
      {text:"🤝 わかり合うことを大事にする",score:5}
    ]
  },
  {
    text:"つよい言い方をしそうなとき、どうする？",
    category:"bridge",
    options:[
      {text:"📢 そのまま言う",score:1},
      {text:"🧊 少しだけ言い方を弱くする",score:3},
      {text:"🌷 伝わりやすい言葉に変える",score:5}
    ]
  },
  {
    text:"気持ちがごちゃごちゃしたとき、どうする？",
    category:"mirror",
    options:[
      {text:"🌪️ そのままモヤモヤする",score:1},
      {text:"📝 少しメモしてみる",score:3},
      {text:"🪞 今の気持ちを名前にしてみる",score:5}
    ]
  },
  {
    text:"うまく伝わらなかったとき、どうする？",
    category:"spark",
    options:[
      {text:"😤 相手がわかってくれないと思う",score:1},
      {text:"🔁 もう一回ちがう言い方をする",score:3},
      {text:"🎯 相手に伝わる言葉を探す",score:5}
    ]
  },
  {
    text:"ふあんになったとき、どう考える？",
    category:"compass",
    options:[
      {text:"☁️ いやな想像でいっぱいになる",score:1},
      {text:"📌 本当に起きていることを考える",score:3},
      {text:"🔦 事実と想像を分けて考える",score:5}
    ]
  },
  {
    text:"世界をよくしたいと思ったとき、どうする？",
    category:"spark",
    options:[
      {text:"🌍 大きすぎて何もできないと思う",score:1},
      {text:"👣 できることをひとつ考える",score:3},
      {text:"🤝 まず近くの一人を大事にする",score:5}
    ]
  }
];

const resultData = {
  compass:{
    emoji:"🧭",
    name:"コンパス型",
    levels:[
      {title:"コンパスの芽", msg:"考える力を育てている途中。迷ったときに『次はどうする？』と考えられると、見える世界が広がります。"},
      {title:"コンパスの使い手", msg:"立ち止まって考えられる人。正解を急がず、よりよい方向を探す力があります。"},
      {title:"コンパスマスター", msg:"物事を広く見て、次の一歩を考えられる人。まわりが迷ったときの道しるべになれます。"}
    ]
  },
  mirror:{
    emoji:"🪞",
    name:"ミラー型",
    levels:[
      {title:"ミラーの芽", msg:"自分の気持ちに気づく力を育てている途中。まずは『今どんな気持ち？』と聞いてみよう。"},
      {title:"ミラーの使い手", msg:"自分の気持ちを見つめる力があります。イライラや不安の奥にある本音に気づける人です。"},
      {title:"ミラーマスター", msg:"自分の心を深く見つめられる人。感情に流されず、気持ちを言葉にする力があります。"}
    ]
  },
  bridge:{
    emoji:"🌉",
    name:"ブリッジ型",
    levels:[
      {title:"ブリッジの芽", msg:"人とつながる力を育てている途中。まずは相手の話を最後まで聞くところから始めよう。"},
      {title:"ブリッジの使い手", msg:"人との関係を大事にできる人。相手の気持ちを想像しながら話せる力があります。"},
      {title:"ブリッジマスター", msg:"人と人の間に橋をかけられる人。ちがう考えをつなげる力があります。"}
    ]
  },
  spark:{
    emoji:"🔥",
    name:"スパーク型",
    levels:[
      {title:"スパークの芽", msg:"行動する力を育てている途中。小さくやってみるだけでも、次の変化につながります。"},
      {title:"スパークの使い手", msg:"気づいたことを行動に変えられる人。思っただけで終わらせない力があります。"},
      {title:"スパークマスター", msg:"まわりにきっかけを作れる人。あなたの一歩が、誰かの一歩につながります。"}
    ]
  }
};

const starts = ["次に","もしもう一度","少しだけ変えるなら","今このあと","似た場面が来たら","同じことが起きたら"];
const targets = ["","自分は","相手は","二人なら","少しだけ"];
const middles = ["どうする？","どうしたい？","どう動く？","どう考える？","どう伝える？","どう関わる？"];

function generateReflection(){
  const s = starts[Math.floor(Math.random()*starts.length)];
  const t = targets[Math.floor(Math.random()*targets.length)];
  const m = middles[Math.floor(Math.random()*middles.length)];
  return `${s}、${t}${m}`;
}

const actionList = [
  "今日は、だれかの話をさいごまで聞いてみよう。",
  "今日は、自分の気持ちをひとつだけ書いてみよう。",
  "今日は、強い言葉をやさしい言葉に変えてみよう。",
  "今日は、すぐ反応する前に3秒だけ待ってみよう。",
  "今日は、相手の気持ちをひとつ想像してみよう。",
  "今日は、『そういう考えもあるか』と一度置いてみよう。"
];

let current = 0;
let total = 0;
let scores = {compass:0, mirror:0, bridge:0, spark:0};

function start(){
  current = 0;
  total = 0;
  scores = {compass:0, mirror:0, bridge:0, spark:0};
  showQuestion();
}

function showStart(){
  const found = getFoundCount();
  document.getElementById("app").innerHTML = `
    <button onclick="start()">▶ 冒険をはじめる</button>
    <p class="small">名前やメールアドレスはいりません。</p>
    <div class="result">
      <h3>AIQ視点図鑑</h3>
      <p>見つけた視点：${found} / 12</p>
      <p class="small">12の視点を少しずつ集めると、自分や相手の見え方が広がります。</p>
    </div>
  `;
}

function showQuestion(){
  const q = questions[current];
  const progress = (current/questions.length)*100;

  document.getElementById("app").innerHTML = `
    <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
    <p class="small">質問 ${current+1} / ${questions.length}</p>
    <h2>${q.text}</h2>
    ${q.options.map(o=>`
      <button class="choice" onclick="answer(${o.score})">${o.text}</button>
    `).join("")}
  `;
}

function answer(score){
  const category = questions[current].category;
  scores[category] += score;
  total += score;
  current++;

  if(current < questions.length){
    showQuestion();
  }else{
    showResult();
  }
}

function getTopCategory(){
  let top = "compass";
  for(const k in scores){
    if(scores[k] > scores[top]) top = k;
  }
  return top;
}

function getLevel(score){
  if(score >= 13) return 2;
  if(score >= 9) return 1;
  return 0;
}

function getFound(){
  return JSON.parse(localStorage.getItem("aiqFound") || "[]");
}

function saveFound(id){
  const found = getFound();
  if(!found.includes(id)){
    found.push(id);
    localStorage.setItem("aiqFound", JSON.stringify(found));
  }
}

function getFoundCount(){
  return getFound().length;
}

function showResult(){
  const top = getTopCategory();
  const level = getLevel(scores[top]);
  const data = resultData[top];
  const result = data.levels[level];
  const id = `${top}-${level}`;

  saveFound(id);

  const found = getFoundCount();
  const action = actionList[Math.floor(Math.random()*actionList.length)];
  const reflection = generateReflection();
  const fullType = `${data.name}｜${result.title}`;

  const shareText = encodeURIComponent(
`What’s AIQをやってみた結果👇
私は「${fullType}」でした ${data.emoji}

見つけた視点：${found} / 12

あなたはどの視点？

問い方が変わると、世界の見え方が変わる。`
  );
  const url = encodeURIComponent(window.location.href);

  document.getElementById("app").innerHTML = `
    <div class="progress"><div class="bar" style="width:100%"></div></div>

    <div class="result">
      <div class="big">${data.emoji}</div>
      <h2>あなたは<br>${fullType}</h2>
      <p>${result.msg}</p>
      <p class="small">スコア：${total} / 60</p>
    </div>

    <div class="result">
      <h3>AIQ視点図鑑</h3>
      <p>見つけた視点：${found} / 12</p>
      <p class="small">これは競争ではありません。少しずつ見方を増やすための図鑑です。</p>
    </div>

    <div class="result">
      <h3>今日の一歩</h3>
      <p>${action}</p>
    </div>

    <div class="result">
      <h3>ひとつ考えてみよう</h3>
      <p>${reflection}</p>
    </div>

    <p class="small">これは今のあなたの状態です。変わってOKです。</p>

    <button onclick="start()">🔁 もう一回やる</button>
    <button class="secondary" onclick="window.open('https://twitter.com/intent/tweet?text=${shareText}&url=${url}','_blank')">📣 Xでシェアする</button>
    <button class="secondary" onclick="copyLink()">🔗 リンクをコピー</button>
  `;
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("リンクをコピーしました！");
}

showStart();
</script>
</body>
</html>
