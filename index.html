<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What’s AIQ</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: linear-gradient(180deg, #fff7d6, #e0f2fe);
      color: #222;
    }

    .container {
      max-width: 640px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      margin-top: 20px;
    }

    .badge {
      display: inline-block;
      background: #ffedd5;
      color: #9a3412;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 34px;
      margin: 0 0 8px;
      line-height: 1.2;
    }

    h2 {
      font-size: 24px;
      margin-top: 18px;
      line-height: 1.5;
    }

    h3 {
      font-size: 26px;
      margin: 10px 0;
    }

    p {
      line-height: 1.8;
      font-size: 16px;
    }

    .small {
      font-size: 14px;
      color: #666;
    }

    .progress {
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      margin: 14px 0 22px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #22c55e);
      width: 0%;
      border-radius: 999px;
      transition: width 0.3s;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border: none;
      border-radius: 18px;
      font-size: 17px;
      font-weight: bold;
      background: #111827;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 0 #374151;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #374151;
    }

    .choice {
      background: #ffffff;
      color: #222;
      border: 2px solid #e5e7eb;
      box-shadow: 0 5px 0 #d1d5db;
      text-align: left;
    }

    .choice:hover {
      background: #fef3c7;
    }

    .secondary {
      background: #f1f5f9;
      color: #222;
      box-shadow: 0 5px 0 #cbd5e1;
    }

    .result {
      background: #f8fafc;
      border-radius: 22px;
      padding: 20px;
      margin: 16px 0;
      border: 2px solid #e5e7eb;
    }

    .big-emoji {
      font-size: 48px;
      margin: 8px 0;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #555;
      margin: 18px 0;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="card">
    <span class="badge">🌱 5分でできる</span>
    <h1>What’s AIQ</h1>
    <p>これはテストではありません。</p>
    <p>あなたの「考え方のくせ」を見つける、小さなあそびです。</p>

    <div id="app"></div>
  </div>

  <footer>
    問い方が変わると、世界の見え方が変わる。
  </footer>
</div>

<script>
const questions = [
  {
    text: "ともだちと意見がちがったとき、どうする？",
    options: [
      { text: "🔥 すぐに言い返す", score: 1 },
      { text: "🤔 ちょっと考えてから話す", score: 3 },
      { text: "👂 まず相手の話をさいごまで聞く", score: 5 }
    ]
  },
  {
    text: "イライラしたとき、どうしてる？",
    options: [
      { text: "💥 すぐに言葉や態度に出る", score: 1 },
      { text: "😮‍💨 少し時間をおく", score: 3 },
      { text: "🪞 なんでイライラしたのか考える", score: 5 }
    ]
  },
  {
    text: "ともだちがきついことを言ったとき、どう思う？",
    options: [
      { text: "😡 ひどい！と思って言い返す", score: 1 },
      { text: "😕 何かあったのかな？と少し考える", score: 3 },
      { text: "🌉 本当は何を伝えたいのか考える", score: 5 }
    ]
  },
  {
    text: "うまくいかなかったとき、どう考える？",
    options: [
      { text: "😢 自分はダメだと思う", score: 1 },
      { text: "🔍 どこがむずかしかったか考える", score: 3 },
      { text: "🧭 次はどうすればいいか考える", score: 5 }
    ]
  },
  {
    text: "自分の考えがまちがっていたと気づいたら？",
    options: [
      { text: "🙈 みとめたくない", score: 1 },
      { text: "😅 ちょっとはずかしいけど考える", score: 3 },
      { text: "✨ 気づけてよかったと思う", score: 5 }
    ]
  },
  {
    text: "しっぱいしたとき、どうする？",
    options: [
      { text: "🌀 もうやりたくないと思う", score: 1 },
      { text: "🛠️ 何を変えればいいか考える", score: 3 },
      { text: "🚀 小さくやり直してみる", score: 5 }
    ]
  },
  {
    text: "話しているとき、勝とうとしてることある？",
    options: [
      { text: "🏆 勝ちたいと思うことが多い", score: 1 },
      { text: "⚖️ ときどき気づく", score: 3 },
      { text: "🤝 わかり合うことを大事にする", score: 5 }
    ]
  },
  {
    text: "つよい言い方をしそうなとき、どうする？",
    options: [
      { text: "📢 そのまま言う", score: 1 },
      { text: "🧊 少しだけ言い方を弱くする", score: 3 },
      { text: "🌷 伝わりやすい言葉に変える", score: 5 }
    ]
  },
  {
    text: "気持ちがごちゃごちゃしたとき、どうする？",
    options: [
      { text: "🌪️ そのままモヤモヤする", score: 1 },
      { text: "📝 少しメモしてみる", score: 3 },
      { text: "🪞 今の気持ちを名前にしてみる", score: 5 }
    ]
  },
  {
    text: "うまく伝わらなかったとき、どうする？",
    options: [
      { text: "😤 相手がわかってくれないと思う", score: 1 },
      { text: "🔁 もう一回ちがう言い方をする", score: 3 },
      { text: "🎯 相手に伝わる言葉を探す", score: 5 }
    ]
  },
  {
    text: "ふあんになったとき、どう考える？",
    options: [
      { text: "☁️ いやな想像でいっぱいになる", score: 1 },
      { text: "📌 本当に起きていることを考える", score: 3 },
      { text: "🔦 事実と想像を分けて考える", score: 5 }
    ]
  },
  {
    text: "世界をよくしたいと思ったとき、どうする？",
    options: [
      { text: "🌍 大きすぎて何もできないと思う", score: 1 },
      { text: "👣 できることをひとつ考える", score: 3 },
      { text: "🤝 まず近くの一人を大事にする", score: 5 }
    ]
  }
];

const actionStarts = [
  "今日は",
  "まずは",
  "ちょっとだけ",
  "試しに",
  "今このあと",
  "次の会話で"
];

const actionMiddles = [
  "だれかの話を",
  "自分の気持ちを",
  "ちがう考えを",
  "言い方を",
  "反応する前に",
  "伝え方を"
];

const actionEnds = [
  "さいごまで聞いてみよう",
  "ひとつ書いてみよう",
  "想像してみよう",
  "やさしくしてみよう",
  "3秒待ってみよう",
  "変えてみよう"
];

function generateAction() {
  const start = actionStarts[Math.floor(Math.random() * actionStarts.length)];
  const middle = actionMiddles[Math.floor(Math.random() * actionMiddles.length)];
  const end = actionEnds[Math.floor(Math.random() * actionEnds.length)];
  return `${start}、${middle}${end}`;
}

let current = 0;
let total = 0;

function start() {
  current = 0;
  total = 0;
  showQuestion();
}

function showStart() {
  document.getElementById("app").innerHTML = `
    <button onclick="start()">▶ はじめる</button>
    <p class="small">名前やメールアドレスはいりません。</p>
  `;
}

function showQuestion() {
  const q = questions[current];
  const progress = (current / questions.length) * 100;

  document.getElementById("app").innerHTML = `
    <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
    <p class="small">質問 ${current + 1} / ${questions.length}</p>
    <h2>${q.text}</h2>
    ${q.options.map(o => `
      <button class="choice" onclick="answer(${o.score})">${o.text}</button>
    `).join("")}
  `;
}

function answer(score) {
  total += score;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let type = "";
  let msg = "";
  let emoji = "";

  if (total >= 50) {
    type = "コンパス型";
    emoji = "🧭";
    msg = "あなたは、考えてから動ける人。まわりに流されず、よい方向を探す力があります。";
  } else if (total >= 38) {
    type = "ミラー型";
    emoji = "🪞";
    msg = "あなたは、自分の気持ちに気づける人。心の中を見つめる力があります。";
  } else if (total >= 26) {
    type = "ブリッジ型";
    emoji = "🌉";
    msg = "あなたは、人と人をつなげる力を持っている人。相手の気持ちを考える力があります。";
  } else {
    type = "スパーク型";
    emoji = "🔥";
    msg = "あなたは、すぐ動ける力を持っている人。元気な力を、やさしい方向に使うともっと伝わります。";
  }

  const randomAction = generateAction();

  const shareText = encodeURIComponent(
    `What’s AIQやってみた結果👇
私は「${type}」でした ${emoji}

あなたはどのタイプ？

問い方が変わると、世界の見え方が変わる。`
  );

  const url = encodeURIComponent(window.location.href);

  document.getElementById("app").innerHTML = `
    <div class="progress"><div class="bar" style="width:100%"></div></div>

    <div class="result">
      <div class="big-emoji">${emoji}</div>
      <h2>あなたは ${type}</h2>
      <p>${msg}</p>
      <p class="small">スコア：${total} / 60</p>
    </div>

    <div class="result">
      <h3>今日の一歩</h3>
      <p>${randomAction}</p>
    </div>

    <button onclick="start()">🔁 もう一回やる</button>
    <button class="secondary" onclick="window.open('https://twitter.com/intent/tweet?text=${shareText}&url=${url}', '_blank')">📣 Xでシェアする</button>
    <button class="secondary" onclick="copyLink()">🔗 リンクをコピー</button>
  `;
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("リンクをコピーしました！");
}

showStart();
</script>
</body>
</html>
