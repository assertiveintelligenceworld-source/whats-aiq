<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What’s AIQ</title>

<style>
body{
font-family:sans-serif;
margin:0;
background:linear-gradient(#fff7d6,#dbeafe);
}
.container{max-width:640px;margin:auto;padding:20px;}
.card{
background:white;
border-radius:20px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}
button{
width:100%;
padding:16px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
background:#111;
color:#fff;
}
.choice{
background:#fff;
color:#222;
border:2px solid #ddd;
}
.result{
background:#f1f5f9;
border-radius:16px;
padding:16px;
margin:12px 0;
}
.big{font-size:50px;}
.small{font-size:13px;color:#666;}
</style>
</head>

<body>
<div class="container">
<div class="card">
<h1>What’s AIQ</h1>
<p>テストじゃないよ。ちょっとした発見ゲーム。</p>

<div id="app"></div>
</div>
</div>

<script>
const questions=[
{text:"意見がちがったら？",cat:"bridge"},
{text:"イライラしたら？",cat:"mirror"},
{text:"うまくいかない？",cat:"compass"},
{text:"伝わらない？",cat:"spark"},
{text:"考えが違う？",cat:"bridge"},
{text:"不安なとき？",cat:"compass"},
{text:"失敗したら？",cat:"spark"},
{text:"強く言いそう？",cat:"bridge"},
{text:"気持ち混乱？",cat:"mirror"},
{text:"勝とうとしてる？",cat:"mirror"},
{text:"世界をよく？",cat:"spark"},
{text:"考え変わった？",cat:"compass"}
];

const opts=[
{text:"すぐ反応",s:1},
{text:"ちょっと止まる",s:3},
{text:"考えて行動",s:5}
];

const chara={
compass:["🧭","未来を見る人"],
mirror:["🪞","自分を見つめる人"],
bridge:["🌉","人をつなぐ人"],
spark:["🔥","動かす人"]
};

const qS=["次に","もう一回","少し変えるなら","同じ場面で"];
const qM=["どうする？","どう動く？","どう伝える？"];

function genQ(){
return qS[Math.floor(Math.random()*qS.length)]+" "+qM[Math.floor(Math.random()*qM.length)];
}

let i=0,total=0,score={compass:0,mirror:0,bridge:0,spark:0};

function start(){
i=0;total=0;
score={compass:0,mirror:0,bridge:0,spark:0};
showQ();
}

function showQ(){
let q=questions[i];
document.getElementById("app").innerHTML=`
<p>${i+1}/12</p>
<h2>${q.text}</h2>
${opts.map(o=>`<button class="choice" onclick="ans(${o.s})">${o.text}</button>`).join("")}
`;
}

function ans(s){
score[questions[i].cat]+=s;
total+=s;
i++;
if(i<12){showQ()}else{res()}
}

function res(){
let top="compass";
for(let k in score){if(score[k]>score[top])top=k;}

let emoji=chara[top][0];
let name=chara[top][1];

const actions=[
"今日はだれかの話を最後まで聞いてみよう",
"今日は少しゆっくり考えてみよう",
"今日はやさしい言葉を使ってみよう",
"今日は一回だけ立ち止まってみよう"
];

document.getElementById("app").innerHTML=`
<div class="result">
<div class="big">${emoji}</div>
<h2>${name}</h2>
<p>今のあなたはこんな感じ</p>
</div>

<div class="result">
<h3>今日の一歩</h3>
<p>${actions[Math.floor(Math.random()*actions.length)]}</p>
</div>

<div class="result">
<h3>ちょっと考えてみよう</h3>
<p>${genQ()}</p>
</div>

<p class="small">これは今の状態。変わってOK。</p>

<button onclick="start()">もう一回やる</button>
`;
}

document.getElementById("app").innerHTML=
`<button onclick="start()">スタート</button>`;
</script>
</body>
</html>
